<!DOCTYPE html> <!-- comments --> 
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
            rel="stylesheet">
        <title>ESTUDOS PROG</title>
    </head>

    <body>
        <h1>Estudo de <span>gerador de IA</span></h1>
        <p>Gerar linhas agora!</p>
        <textarea class="text-box" rows="3" placeholder="Digite aqui (Ex.: Cavalo de fogo correndo na praia)"></textarea>
        <button class="button-gen">Gerar código</button>
        <div class="result">
            <div class="column">
                <h2>Código</h2>
                <p class="code-bloc"></p>
            </div>
            <div class="column">
                <h2>Preview</h2>
                <iframe class="code-result"></iframe>
            </div>
        </div>
    </body>

    <script src="scripts.js"></script>

</html>
